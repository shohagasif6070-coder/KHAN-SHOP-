<!DOCTYPE html>
<html>
<head>
    <title>Login - KHAN STORE</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: #2a5298;
            outline: none;
            box-shadow: 0 0 5px rgba(42,82,152,0.5);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #1e3c72;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #2a5298;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

<div class="login-box">
    <h2>KHAN STORE Login</h2>

    <form>
        <input type="text" placeholder="Enter username" required>
        <input type="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

    <a href="KHAN.HTML" class="back-link">Back to Home</a>
</div>

</body>
</html>
